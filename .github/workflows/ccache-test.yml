name: ccache-test

on:
  push:
    branches: [ccache-test]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        pch: [ON, OFF]
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1

      - name: 🔧 Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03
        with:
          key: test-ccache-${{ matrix.pch }}
          variant: ccache
          max-size: 1G
          save: true

      - name: 📝 Create test project
        shell: bash
        run: |
          mkdir -p /tmp/t/src
          echo 'cmake_minimum_required(VERSION 3.22)' > /tmp/t/CMakeLists.txt
          echo 'project(t CXX)' >> /tmp/t/CMakeLists.txt
          echo 'set(CMAKE_CXX_STANDARD 17)' >> /tmp/t/CMakeLists.txt
          echo 'set(VERSION_NUM 0 CACHE STRING "version")' >> /tmp/t/CMakeLists.txt
          echo 'option(USE_CCACHE "ccache" ON)' >> /tmp/t/CMakeLists.txt
          echo 'if(USE_CCACHE)' >> /tmp/t/CMakeLists.txt
          echo '  find_program(CCACHE ccache)' >> /tmp/t/CMakeLists.txt
          echo '  if(CCACHE)' >> /tmp/t/CMakeLists.txt
          echo '    set(CMAKE_C_COMPILER_LAUNCHER ccache)' >> /tmp/t/CMakeLists.txt
          echo '    set(CMAKE_CXX_COMPILER_LAUNCHER ccache)' >> /tmp/t/CMakeLists.txt
          echo '  endif()' >> /tmp/t/CMakeLists.txt
          echo 'endif()' >> /tmp/t/CMakeLists.txt
          echo 'option(PCH "pch" ON)' >> /tmp/t/CMakeLists.txt
          echo 'add_executable(t src/a.cpp src/b.cpp src/c.cpp src/d.cpp src/e.cpp src/f.cpp src/g.cpp src/h.cpp src/i.cpp src/j.cpp)' >> /tmp/t/CMakeLists.txt
          echo 'configure_file(version.h.in ${CMAKE_BINARY_DIR}/version.h)' >> /tmp/t/CMakeLists.txt
          echo 'target_include_directories(t PRIVATE ${CMAKE_BINARY_DIR})' >> /tmp/t/CMakeLists.txt
          echo 'if(PCH)' >> /tmp/t/CMakeLists.txt
          echo '  target_precompile_headers(t PRIVATE <windows.h>)' >> /tmp/t/CMakeLists.txt
          echo 'endif()' >> /tmp/t/CMakeLists.txt

          cat > /tmp/t/version.h.in <<< '#pragma once'
          echo '#define VERSION_NUM @VERSION_NUM@' >> /tmp/t/version.h.in

          for f in a b c d e f g h i j; do
            cat > /tmp/t/src/${f}.cpp <<< '#include "version.h"'
            echo '#include <windows.h>' >> /tmp/t/src/${f}.cpp
            echo '#include <vector>' >> /tmp/t/src/${f}.cpp
            echo '#include <algorithm>' >> /tmp/t/src/${f}.cpp
            echo '#include <string>' >> /tmp/t/src/${f}.cpp
            echo '#include <sstream>' >> /tmp/t/src/${f}.cpp
            echo '#include <iostream>' >> /tmp/t/src/${f}.cpp
            echo '#include <map>' >> /tmp/t/src/${f}.cpp
            echo '#include <set>' >> /tmp/t/src/${f}.cpp
            echo '#include <memory>' >> /tmp/t/src/${f}.cpp
            echo '#include <thread>' >> /tmp/t/src/${f}.cpp
            echo '#include <mutex>' >> /tmp/t/src/${f}.cpp
            echo '#include <chrono>' >> /tmp/t/src/${f}.cpp
            echo '#include <regex>' >> /tmp/t/src/${f}.cpp
            echo '#include <random>' >> /tmp/t/src/${f}.cpp
            echo '#include <numeric>' >> /tmp/t/src/${f}.cpp
            echo '#include <functional>' >> /tmp/t/src/${f}.cpp
            echo '#include <optional>' >> /tmp/t/src/${f}.cpp
            echo '#include <variant>' >> /tmp/t/src/${f}.cpp
            echo '#include <filesystem>' >> /tmp/t/src/${f}.cpp
            echo 'int __declspec(noinline) compute(int x) {' >> /tmp/t/src/${f}.cpp
            echo '  std::vector<int> v(10000); std::iota(v.begin(), v.end(), 0);' >> /tmp/t/src/${f}.cpp
            echo '  std::shuffle(v.begin(), v.end(), std::mt19937(x));' >> /tmp/t/src/${f}.cpp
            echo '  std::sort(v.begin(), v.end());' >> /tmp/t/src/${f}.cpp
            echo '  auto it = std::unique(v.begin(), v.end());' >> /tmp/t/src/${f}.cpp
            echo '  return (int)std::distance(v.begin(), it) + VERSION_NUM;' >> /tmp/t/src/${f}.cpp
            echo '}' >> /tmp/t/src/${f}.cpp
          done

      - name: 🟢 Build 1 — cold cache PCH=${{ matrix.pch }}
        shell: bash
        run: |
          mkdir -p /tmp/t/b1 && cd /tmp/t/b1
          cmake .. -DVERSION_NUM=1 -DPCH=${{ matrix.pch }}
          cmake --build . --config Release 2>&1 | tail -5
          echo "=== B1 (cold) ==="
          ccache -s -v | grep -E "Hits|Misses|Cacheable|Cache size"

      - name: 🟡 Build 2 — same source, warm cache PCH=${{ matrix.pch }}
        shell: bash
        run: |
          ccache -z
          mkdir -p /tmp/t/b2 && cd /tmp/t/b2
          cmake .. -DVERSION_NUM=1 -DPCH=${{ matrix.pch }}
          cmake --build . --config Release 2>&1 | tail -5
          echo "=== B2 (warm, same NUM) ==="
          ccache -s -v | grep -E "Hits|Misses|Cacheable|Cache size"

      - name: 🔴 Build 3 — version header changed PCH=${{ matrix.pch }}
        shell: bash
        run: |
          ccache -z
          mkdir -p /tmp/t/b3 && cd /tmp/t/b3
          cmake .. -DVERSION_NUM=2 -DPCH=${{ matrix.pch }}
          cmake --build . --config Release 2>&1 | tail -5
          echo "=== B3 (diff NUM) ==="
          ccache -s -v | grep -E "Hits|Misses|Cacheable|Cache size"

      - name: 📊 Final
        shell: bash
        run: |
          echo "=== CCACHE GLOBAL ==="
          ccache -s
