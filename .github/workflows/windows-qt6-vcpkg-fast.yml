---
name: 🪟 Windows Qt6 (vcpkg fast)
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write

jobs:
  build:
    name: build (windows)
    runs-on: windows-2022

    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: 🔨 Uninstall system cmake
        shell: bash
        run: |
          choco uninstall cmake.install

      - name: 🐩 Install CMake and Ninja
        uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e
        with:
          cmakeVersion: 3.31.6

      - name: 🧽 Developer Command Prompt for Microsoft Visual C++
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 #v1

      - name: 🎡 Setup vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: 🦬 Setup flex/bison
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f #v1.13
        with:
          repository: 'lexxmark/winflexbison'
          fileName: '*.zip'
          tag: 'v2.5.24'
          extract: true

      - name: 🛍️ Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 #v1.2
        with:
          max-size: 8G
          key: build-ccache-win64-qt6-vcpkg-v1
          save: true

      - name: 📦 Restore configured build directory
        id: restore-build-dir
        uses: actions/cache/restore@v4
        with:
          path: build
          key: cmake-build-win64-qt6-v1-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'vcpkg/vcpkg.json', 'cmake/VcpkgToolchain.cmake', 'vcpkg/ports/**', '.github/workflows/windows-qt6-vcpkg.yml') }}

      - name: 🛍️ Tune ccache configuration
        shell: bash
        run: |
          # Keep ccache stable across fresh Windows runners. PCH stays off for MSVC.
          ccache --set-config sloppiness=pch_defines,time_macros,include_file_mtime,include_file_ctime

      - name: 🌱 Install dependencies and generate project files
        if: steps.restore-build-dir.outputs.cache-hit != 'true'
        id: cmake-configure
        shell: bash
        env:
          X_VCPKG_ASSET_SOURCES: x-azurl,https://assetcache.open-vcpkg.org/assetcache,,read
        run: |
          BUILD_DIR=$( cygpath "${{ github.workspace }}/build" )
          SOURCE_DIR=$( cygpath "${{ github.workspace }}" )

          cmake -S "${SOURCE_DIR}" \
                -B "${BUILD_DIR}" \
                -G Ninja \
                -D CMAKE_BUILD_TYPE=Release \
                -D WITH_VCPKG=ON \
                -D CREATE_ZIP=ON \
                -D VCPKG_TARGET_TRIPLET=x64-windows-release \
                -D VCPKG_HOST_TRIPLET=x64-windows-release \
                -D WITH_DESKTOP=ON \
                -D WITH_3D=ON \
                -D WITH_BINDINGS=ON \
                -D WITH_GEOGRAPHICLIB=OFF \
                -D WITH_SFCGAL=ON \
                -D ENABLE_TESTS=OFF \
                -D USE_CCACHE=ON \
                -D USE_PRECOMPILED_HEADERS=OFF \
                -D ENABLE_UNITY_BUILDS=OFF \
                -D FLEX_EXECUTABLE="${SOURCE_DIR}/win_flex.exe" \
                -D BISON_EXECUTABLE="${SOURCE_DIR}/win_bison.exe" \
                -D WITH_QTWEBENGINE=OFF \
                -D VCPKG_INSTALL_OPTIONS="--x-buildtrees-root=C:/src" \
                -D NUGET_SOURCE="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
                -D "NUGET_USERNAME=${GITHUB_ACTOR}" \
                -D NUGET_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: 💾 Save configured build directory
        if: steps.restore-build-dir.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: build
          key: cmake-build-win64-qt6-v1-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'vcpkg/vcpkg.json', 'cmake/VcpkgToolchain.cmake', 'vcpkg/ports/**', '.github/workflows/windows-qt6-vcpkg.yml') }}

      - name: 🌋 Build
        shell: bash
        run: |
          cmake --build "${{ github.workspace }}/build" --config Release

      - name: 📦 Package
        shell: bash
        run: |
          cmake --build "${{ github.workspace }}/build" --target bundle --config Release

      - name: 📑 Upload dep build logs
        id: upload-build-logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: build-logs-x64-windows-vcpkg-fast
          path: |
            C:/src/**/*.log

      - name: 📤 Upload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: artifact-win64-qt6
        with:
          name: qgis-windows-qt6-vcpkg-fast
          archive: false
          path: |
            build/*-win64.zip
