---
name: 🪟 Windows Qt6
on:
  push:
    branches:
      - master
      - release-**
  pull_request:
  workflow_dispatch:
  release:
    types: ['published']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write

jobs:
  build:
    name: build (windows)
    runs-on: windows-2022

    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: 🔨 Uninstall system cmake
        shell: bash
        run: |
          choco uninstall cmake.install

      - name: 🐩 Install CMake and Ninja
        uses: lukka/get-cmake@f176ccd3f28bda569c43aae4894f06b2435a3375
        with:
          cmakeVersion: 3.31.6

      - name: 🧽 Developer Command Prompt for Microsoft Visual C++
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 #v1

      - name: 🦬 Setup flex/bison
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 #v1.12
        with:
          repository: 'lexxmark/winflexbison'
          fileName: '*.zip'
          tag: 'v2.5.24'
          extract: true

      - name: 🛍️ Setup ccache
        uses: hendrikmuhs/ccache-action@63069e3931dedbf3b63792097479563182fe70d1 #v1.2
        with:
          max-size: 1G
          key: build-ccache-win64-qt6-minimal-${{ github.event.pull_request.base.ref || github.ref_name }}
          save: ${{ github.event_name == 'push' }}

      - name: 🛍️ Tune ccache configuration
        shell: bash
        run: |
          ccache --set-config sloppiness=pch_defines,time_macros,include_file_mtime,include_file_ctime

      - name: 🎡 Setup vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: 📦 Download pre-built SDK from upstream
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching latest SDK artifact..."
          ARTIFACT_ID=$(gh api repos/qgis/QGIS/actions/artifacts?name=qgis-sdk-x64-windows --jq '.artifacts[0].id')
          echo "Downloading artifact $ARTIFACT_ID..."
          gh api "repos/qgis/QGIS/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/sdk.zip
          cd /tmp && rm -rf sdk && mkdir sdk
          echo "Extracting outer zip..."
          7z x /tmp/sdk.zip -o/tmp/sdk -y > /dev/null
          # Find inner vcpkg export zip
          INNER=$(find /tmp/sdk -name "vcpkg-export-*.zip" -type f | head -1)
          if [ -z "$INNER" ]; then
            echo "ERROR: vcpkg export zip not found"
            exit 1
          fi
          # Extract inner zip to a temp location
          TMPDIR=/tmp/sdk-inner-$RANDOM
          mkdir -p "$TMPDIR"
          7z x "$INNER" -o"$TMPDIR" -y > /dev/null
          # Find installed/ directory (may be nested under a top-level dir)
          INSTALLED_DIR=$(find "$TMPDIR" -maxdepth 3 -name "installed" -type d | head -1)
          if [ -z "$INSTALLED_DIR" ]; then
            echo "ERROR: installed/ not found in SDK"
            exit 1
          fi
          SDK_ROOT=$(dirname "$INSTALLED_DIR")
          SDK_ROOT="$(cd "$SDK_ROOT" && cygpath -m "$PWD")"
          echo "SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "SDK root: $SDK_ROOT"
          echo "SDK triplets:"
          ls "$SDK_ROOT/installed/" 2>/dev/null

      - name: 🌱 Generate project files
        shell: bash
        run: |
          BUILD_DIR=$( cygpath "${{ github.workspace }}/build" )
          SOURCE_DIR=$( cygpath "${{ github.workspace }}" )
          rm -rf "$BUILD_DIR"
          cmake -S "${SOURCE_DIR}" \
                -B "${BUILD_DIR}" \
                -G Ninja \
                -D CMAKE_BUILD_TYPE=Release \
                -D CMAKE_PREFIX_PATH="${{ env.SDK_ROOT }}/installed/x64-windows-release" \
                -D VCPKG_TARGET_TRIPLET=x64-windows-release \
                -D VCPKG_HOST_TRIPLET=x64-windows-release \
                -D CREATE_ZIP=ON \
                -D WITH_VCPKG=OFF \
                -D WITH_DESKTOP=ON \
                -D WITH_QTWEBENGINE=OFF \
                -D WITH_3D=OFF \
                -D WITH_AUTH=OFF \
                -D WITH_BINDINGS=OFF \
                -D WITH_EXIV2=OFF \
                -D WITH_PDAL=OFF \
                -D WITH_QTPOSITIONING=OFF \
                -D WITH_QGIS_PROCESS=OFF \
                -D WITH_POSTGRESQL=OFF \
                -D WITH_SPATIALITE=OFF \
                -D WITH_EPT=OFF \
                -D WITH_COPC=OFF \
                -D WITH_DRACO=OFF \
                -D WITH_QUICK=OFF \
                -D WITH_GEOGRAPHICLIB=OFF \
                -D WITH_SFCGAL=OFF \
                -D WITH_ORACLE=OFF \
                -D WITH_HANA=OFF \
                -D WITH_GSL=OFF \
                -D WITH_CRASH_HANDLER=OFF \
                -D WITH_SERVER=OFF \
                -D ENABLE_LOCAL_BUILD_SHORTCUTS=ON \
                -D ENABLE_TESTS=OFF \
                -D ENABLE_UNITY_BUILDS=OFF \
                -D USE_CCACHE=ON \
                -D FLEX_EXECUTABLE="${SOURCE_DIR}/win_flex.exe" \
                -D BISON_EXECUTABLE="${SOURCE_DIR}/win_bison.exe"

      - name: 🌋 Build
        shell: bash
        run: |
          cmake --build "${{ github.workspace }}/build" --config Release

      - name: 📦 Package
        shell: bash
        run: |
          cmake --build "${{ github.workspace }}/build" --target bundle --config Release

      - name: 📑 Upload dep build logs
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: build-logs-x64-windows
          path: |
            C:/src/**/*.log

      - name: 📤 Upload bundle
        uses: actions/upload-artifact@v7
        id: artifact-win64-qt6
        with:
          name: qgis-windows-qt6
          path: |
            build/*-win64.zip

      - name: Schedule download comment
        uses: ./.github/actions/post_sticky_comment
        if: github.event_name == 'pull_request'
        with:
          marker: mingw64-qt6
          body: |
            ### 🪟 Windows Qt6 builds
            Download [Windows Qt6 builds of this PR for testing](${{ steps.artifact-win64-qt6.outputs.artifact-url }}).
            *(Built from commit ${{ github.event.pull_request.head.sa }})*
          pr: ${{ github.event.number }}
